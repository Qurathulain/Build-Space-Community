<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BuildSpace | Login & Signup</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <main class="auth-shell">
        <section class="auth-card row g-0">
            <aside class="col-md-5 p-4 p-lg-5 auth-brand d-flex flex-column justify-content-between">
                <div>
                    <div class="logo-mark mb-3">B</div>
                    <h1 class="brand-title">BuildSpace</h1>
                    <p class="brand-subtitle mb-0">
                        The social network where students build, share, and grow in tech.
                    </p>
                </div>
                <p class="small text-muted mb-0">Connect with peers. Ship projects. Get hired.</p>
            </aside>

            <div class="col-md-7 p-4 p-lg-5">
                <div class="tab-pill d-flex gap-2 mb-4">
                    <button id="showLogin" class="btn btn-accent w-50" type="button">Login</button>
                    <button id="showSignup" class="btn btn-outline-light w-50" type="button">Signup</button>
                </div>

                <div id="loginFormWrap">
                    <h2 class="h4 mb-3">Welcome Back</h2>
                    <form id="loginForm" novalidate>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" placeholder="you@example.com" required />
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-control" placeholder="At least 6 characters" required />
                        </div>
                        <button type="submit" class="btn btn-accent w-100 py-2">Continue to Dashboard</button>
                    </form>
                </div>

                <div id="signupFormWrap" class="d-none">
                    <h2 class="h4 mb-3">Create Your Account</h2>
                    <form id="signupForm" novalidate>
                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <input name="fullName" type="text" class="form-control" placeholder="Alex Johnson"
                                required />
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" placeholder="alex@example.com" required />
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-control" placeholder="At least 6 characters" required />
                        </div>
                        <button type="submit" class="btn btn-accent w-100 py-2">Create Account</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
